AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Madame Minou — AI astrology readings for cats.
  Lambda (chart engine + AI reading) + API Gateway + S3 static hosting via CloudFront.

Globals:
  Function:
    Timeout: 29  # Must not exceed API Gateway REST API's ~29s integration timeout
    Runtime: python3.11
    MemorySize: 256

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: "Set to CloudFront domain in prod; * for local dev"
    # Tighten to CloudFront origin before going public

Resources:
  # ─── Lambda: reading endpoint ───────────────────────────────────────────
  ReadingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: lambda/
      Description: Madame Minou reading endpoint — chart facts → AI voice → reading_text
      Environment:
        Variables:
          # Deploy region must match the Claude Platform on AWS workspace (us-east-1)
          AWS_REGION: !Ref AWS::Region
          ANTHROPIC_AWS_WORKSPACE_ID: '{{resolve:ssm:/madame-minou/workspace-id}}'
          MINOU_MODEL: claude-sonnet-4-6
          MINOU_MOCK_AI: 'false'
      Events:
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: get
            RestApiId: !Ref MinouApi
        ReadingApi:
          Type: Api
          Properties:
            Path: /reading
            Method: post
            RestApiId: !Ref MinouApi

  # ─── API Gateway ────────────────────────────────────────────────────────
  MinouApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"
        # Tighten to CloudFront origin before going public

  # ─── S3 bucket for static frontend ─────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'madame-minou-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── CloudFront distribution (HTTPS for S3) ────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for Madame Minou frontend bucket

  # ─── Bucket policy allowing CloudFront access ──────────────────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: 's3:GetObject'
            Resource: !Sub '${FrontendBucket.Arn}/*'

Outputs:
  ApiUrl:
    Description: API Gateway URL for the reading endpoint
    Value: !Sub 'https://${MinouApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/reading'
  HealthUrl:
    Description: API Gateway URL for the health check
    Value: !Sub 'https://${MinouApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/health'
  FrontendUrl:
    Description: CloudFront URL for the static frontend
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
  FrontendBucketName:
    Description: S3 bucket for uploading frontend assets
    Value: !Ref FrontendBucket
