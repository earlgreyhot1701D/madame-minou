AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Madame Minou — deploy spike (Block 0).
  Hello-world Lambda + API Gateway + S3 static hosting via CloudFront.

Globals:
  Function:
    Timeout: 10
    Runtime: python3.11
    MemorySize: 128

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

Resources:
  # ─── Lambda: hello-world endpoint ───────────────────────────────────────
  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: lambda/
      Description: Hello-world spike — confirms Lambda + API Gateway path works
      Events:
        HelloApi:
          Type: Api
          Properties:
            Path: /hello
            Method: get
            RestApiId: !Ref MinouApi

  # ─── API Gateway ────────────────────────────────────────────────────────
  MinouApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"   # tighten to CloudFront origin in production

  # ─── S3 bucket for static frontend ─────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'madame-minou-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ─── CloudFront distribution (HTTPS for S3) ────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for Madame Minou frontend bucket

  # ─── Bucket policy allowing CloudFront access ──────────────────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: 's3:GetObject'
            Resource: !Sub '${FrontendBucket.Arn}/*'

Outputs:
  ApiUrl:
    Description: API Gateway URL for the hello endpoint
    Value: !Sub 'https://${MinouApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/hello'
  FrontendUrl:
    Description: CloudFront URL for the static frontend
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
  FrontendBucketName:
    Description: S3 bucket for uploading frontend assets
    Value: !Ref FrontendBucket
